<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Registration Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-7 col-md-9">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="text-center text-primary fw-bold">
                        Student Registration Form
                    </h2>

                    <p class="text-center text-muted mb-4">
                        Please fill in the details below
                    </p>

                    <form id="registrationForm">

                        <!-- Full Name -->

                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                <i class="fa-solid fa-user text-primary"></i>
                                Full Name
                            </label>

                            <input
                            type="text"
                            id="name"
                            class="form-control"
                            placeholder="Enter your full name">

                            <small id="nameError" class="text-danger"></small>

                        </div>

                        <!-- Roll Number -->

                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                <i class="fa-solid fa-id-card text-primary"></i>
                                Roll Number
                            </label>

                            <input
                            type="text"
                            id="roll"
                            class="form-control"
                            placeholder="Enter Roll Number">

                            <small id="rollError" class="text-danger"></small>

                        </div>

                        <!-- Email -->

                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                <i class="fa-solid fa-envelope text-primary"></i>
                                Email ID
                            </label>

                            <input
                            type="email"
                            id="email"
                            class="form-control"
                            placeholder="Enter Email">

                            <small id="emailError" class="text-danger"></small>

                        </div>

                        <!-- Mobile -->

                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                <i class="fa-solid fa-phone text-primary"></i>
                                Mobile Number
                            </label>

                            <input
                            type="text"
                            id="mobile"
                            class="form-control"
                            placeholder="Enter Mobile Number">

                            <small id="mobileError" class="text-danger"></small>

                        </div>

                        <!-- Password -->

                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                <i class="fa-solid fa-lock text-primary"></i>
                                Password
                            </label>

                            <input
                            type="password"
                            id="password"
                            class="form-control"
                            placeholder="Enter Password">

                            <small id="passwordError" class="text-danger"></small>

                        </div>

                        <!-- Confirm Password -->

                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                <i class="fa-solid fa-key text-primary"></i>
                                Confirm Password
                            </label>

                            <input
                            type="password"
                            id="confirmPassword"
                            class="form-control"
                            placeholder="Confirm Password">

                            <small id="confirmPasswordError" class="text-danger"></small>

                        </div>

                        <!-- Gender -->

                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                Gender
                            </label>

                            <div>

                                <div class="form-check form-check-inline">

                                    <input
                                    class="form-check-input"
                                    type="radio"
                                    name="gender"
                                    value="Male">

                                    <label class="form-check-label">
                                        Male
                                    </label>

                                </div>

                                <div class="form-check form-check-inline">

                                    <input
                                    class="form-check-input"
                                    type="radio"
                                    name="gender"
                                    value="Female">

                                    <label class="form-check-label">
                                        Female
                                    </label>

                                </div>

                                <div class="form-check form-check-inline">

                                    <input
                                    class="form-check-input"
                                    type="radio"
                                    name="gender"
                                    value="Other">

                                    <label class="form-check-label">
                                        Other
                                    </label>

                                </div>

                            </div>

                            <small id="genderError" class="text-danger"></small>

                        </div>

                        <!-- Department -->

                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                <i class="fa-solid fa-graduation-cap text-primary"></i>
                                Department
                            </label>

                            <select
                            id="department"
                            class="form-select">

                                <option value="">
                                    Select Department
                                </option>

                                <option>CSE</option>
                                <option>IT</option>
                                <option>ECE</option>
                                <option>EEE</option>
                                <option>Mechanical</option>
                                <option>Civil</option>

                            </select>

                            <small id="departmentError" class="text-danger"></small>

                        </div>

                        <!-- Date of Birth -->

                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                <i class="fa-solid fa-calendar text-primary"></i>
                                Date of Birth
                            </label>

                            <input
                            type="date"
                            id="dob"
                            class="form-control">

                            <small id="dobError" class="text-danger"></small>

                        </div>

                        <!-- Submit -->

                        <div class="d-grid mt-4">

                            <button
                            type="submit"
                            class="btn btn-primary btn-lg">

                                Register

                            </button>

                        </div>

                        <h5
                        id="successMessage"
                        class="text-center mt-4 text-success">
                        </h5>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- JavaScript -->

<script src="script.js"></script>

</body>
</html>
